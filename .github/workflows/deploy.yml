name: Deploy to DonWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DONWEB_HOST }}
          username: ${{ secrets.DONWEB_USERNAME }}
          key: ${{ secrets.DONWEB_SSH_KEY }}
          port: ${{ secrets.DONWEB_PORT }}
          script: |
            # Ir a la carpeta correcta de producción
            cd /home/adventurengine/htdocs/adventurengine.com
            
            # Forzar la descarga desde GitHub ignorando si antes no era un repo git
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/crashon182/adventure-engine.git
              git fetch
              git checkout -t origin/main -f
            else
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Instalar dependencias
            npm install
            
            # Ejecutar migraciones de Prisma si aplica
            npx prisma generate
            npx prisma db push
            
            # Construir la aplicación Next.js
            npm run build
            
            # Eliminar la instancia vieja si existe y levantarla en el puerto correcto (3002) forzando el directorio (cwd)
            pm2 delete adventure-engine || true
            pm2 start npm --name "adventure-engine" --cwd "/home/adventurengine/htdocs/adventurengine.com" -- start -- -p 3002
            pm2 save
