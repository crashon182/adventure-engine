name: Deploy to DonWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DONWEB_HOST }}
          username: ${{ secrets.DONWEB_USERNAME }}
          password: ${{ secrets.DONWEB_PASSWORD }}
          port: ${{ secrets.DONWEB_PORT }}
          script: |
            # Ir a la carpeta correcta de producción
            cd /home/adventurengine/htdocs/adventurengine.com
            
            # Forzar la descarga desde GitHub ignorando si antes no era un repo git
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/crashon182/adventure-engine.git
              git fetch
              git checkout -t origin/main -f
            else
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Instalar dependencias
            npm install
            
            # Sincronizar Base de Datos (Crea tablas nuevas como GlobalSettings)
            npx prisma generate
            npx prisma db push
            
            # Limpiar compilación anterior y construir (Asegura que aparezcan cambios visuales)
            rm -rf .next
            NODE_OPTIONS="--max-old-space-size=1536" npm run build
            
            # Reiniciar PM2 para aplicar cambios
            pm2 delete adventure-engine || true
            pm2 start npm --name "adventure-engine" --cwd "/home/adventurengine/htdocs/adventurengine.com" -- start -- -p 3002
            pm2 save
