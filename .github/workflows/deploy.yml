name: Deploy to DonWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DONWEB_HOST }}
          username: ${{ secrets.DONWEB_USERNAME }}
          password: ${{ secrets.DONWEB_PASSWORD }}
          port: ${{ secrets.DONWEB_PORT }}
          script: |
            cd /home/adventurengine/htdocs/adventurengine.com

            # --- PASO 1: Descargar código ---
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/crashon182/adventure-engine.git
              git fetch
              git checkout -t origin/main -f
            else
              git reset --hard origin/main
              git pull origin main
            fi

            # --- PASO 2: Encontrar Node moderno ---
            # Buscamos en las rutas típicas de CloudPanel
            NODE_EXE=""
            for p in /usr/bin/node22 /usr/bin/node20 /usr/bin/node18; do
              if [ -x "$p" ]; then
                NODE_EXE="$p"
                break
              fi
            done
            
            # Si no encontramos ninguno, usamos el default
            if [ -z "$NODE_EXE" ]; then
              NODE_EXE=$(which node)
            fi

            echo "=========================================="
            echo "NODE BINARIO: $NODE_EXE"
            $NODE_EXE -v
            echo "NPM: $(which npm)"
            echo "USUARIO: $(whoami)"
            echo "=========================================="

            # --- PASO 3: Instalar y compilar ---
            # No borramos .next antes de compilar para evitar 502 innecesarios
            $NODE_EXE $(which npm) install
            $NODE_EXE $(which npx) prisma generate
            $NODE_EXE $(which npx) prisma db push
            
            # Compilamos primero, la app vieja sigue corriendo en memoria
            NODE_OPTIONS="--max-old-space-size=2048" $NODE_EXE $(which npm) run build

            # --- PASO 4: Asegurar ecosystem.config.js ---
            cat > ecosystem.config.js << EOFCONFIG
            module.exports = {
              apps: [{
                name: 'adventure-engine',
                cwd: '/home/adventurengine/htdocs/adventurengine.com',
                script: 'node_modules/next/dist/bin/next',
                args: 'start -p 3002',
                interpreter: '$NODE_EXE',
                env: {
                  NODE_ENV: 'production',
                  PORT: '3002',
                },
              }],
            };
            EOFCONFIG

            # --- PASO 5: Reinicio quirúrgico ---
            # NO usamos pm2 kill porque apaga todas tus otras webs (elbooz, academiaindie)
            # Solo reiniciamos esta app específica usando el archivo de configuración
            $NODE_EXE $(which pm2) start ecosystem.config.js || $NODE_EXE $(which pm2) reload ecosystem.config.js
            $NODE_EXE $(which pm2) save
