name: Deploy to DonWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DONWEB_HOST }}
          username: ${{ secrets.DONWEB_USERNAME }}
          password: ${{ secrets.DONWEB_PASSWORD }}
          port: ${{ secrets.DONWEB_PORT }}
          script: |
            # Ir a la carpeta correcta de producción
            cd /home/adventurengine/htdocs/adventurengine.com
            
            # Forzar la descarga desde GitHub ignorando si antes no era un repo git
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/crashon182/adventure-engine.git
              git fetch
              git checkout -t origin/main -f
            else
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Forzar el uso del Node que vemos en la consola (v20+)
            NODE_PATH=$(which node)
            echo "Usando Node en: $NODE_PATH"
            $NODE_PATH -v
            
            # Instalar dependencias con el Node correcto
            $NODE_PATH $(which npm) install
            
            # Sincronizar Base de Datos
            $NODE_PATH $(which npx) prisma generate
            $NODE_PATH $(which npx) prisma db push
            
            # Construir (con boost de memoria)
            NODE_OPTIONS="--max-old-space-size=1536" $NODE_PATH $(which npm) run build
            
            # Reiniciar PM2 forzando el intérprete de Node actual
            pm2 delete adventure-engine || true
            pm2 start $NODE_PATH --name "adventure-engine" -- /home/adventurengine/htdocs/adventurengine.com/node_modules/next/dist/bin/next start -p 3002
            pm2 save
