name: Deploy to DonWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DONWEB_HOST }}
          username: ${{ secrets.DONWEB_USERNAME }}
          password: ${{ secrets.DONWEB_PASSWORD }}
          port: ${{ secrets.DONWEB_PORT }}
          script: |
            # Ir a la carpeta correcta de producción
            cd /home/adventurengine/htdocs/adventurengine.com
            
            # Forzar la descarga desde GitHub ignorando si antes no era un repo git
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/crashon182/adventure-engine.git
              git fetch
              git checkout -t origin/main -f
            else
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Intentar encontrar el Node 22 o 20 de CloudPanel, si no usar el default
            if [ -f "/usr/bin/node22" ]; then
              NODE_EXE="/usr/bin/node22"
            elif [ -f "/usr/bin/node20" ]; then
              NODE_EXE="/usr/bin/node20"
            else
              NODE_EXE=$(which node)
            fi
            
            echo "USANDO NODE BINARIO: $NODE_EXE"
            $NODE_EXE -v
            
            # Instalar dependencias con el Node correcto
            $NODE_EXE $(which npm) install
            
            # Sincronizar Base de Datos con el Node correcto
            $NODE_EXE $(which npx) prisma generate
            $NODE_EXE $(which npx) prisma db push
            
            # Construir con boost de memoria y el Node correcto
            NODE_OPTIONS="--max-old-space-size=1536" $NODE_EXE $(which npm) run build
            
            # Reiniciar PM2 forzando el uso del ejecutable de Node correcto
            pm2 delete adventure-engine || true
            pm2 start $NODE_EXE --name "adventure-engine" -- /home/adventurengine/htdocs/adventurengine.com/node_modules/next/dist/bin/next start -p 3002
            pm2 save
